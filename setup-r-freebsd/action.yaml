name: 'r-hub/actions/setup-r-freebsd'
description: |
  Setup a FreeBSD VM with R. Run this action on `ubuntu-latest`.
  Based on https://github.com/vmactions/freebsd-vm.
author: 'Gábor Csárdi'

inputs:
  release:
    description: 'The release version of FreeBSD VM.'
    required: false
    default: '14.1'
  r-version:
    description: |
      R version to install: "release" (from pkg) or "devel" (prebuilt daily
      snapshot, see the r-devel-url input).
    required: false
    default: 'release'
  r-devel-url:
    description: |
      URL of the prebuilt R-devel tarball used when r-version is "devel".
      A deps.txt listing the runtime packages must sit next to it. Where this
      artifact should be hosted long term is an open question; the default is
      a community build.
    required: false
    default: 'https://github.com/chrislongros/actions/releases/download/r-devel-latest/R-devel-freebsd14-amd64-gcc14.tar.zst'

runs:
  using: "composite"
  steps:

  - name: Start FreeBSD VM. This might take 2-3 minutes.
    uses: vmactions/freebsd-vm@v1
    with:
      release: ${{ inputs.release || '14.1' }}
      envs: 'RUNNER_TEMP R_LIBS_USER NOT_CRAN'
      run: |
        freebsd-version
        ln -s /usr/share/zoneinfo/Europe/Madrid  /etc/localtime
        chsh -s /bin/sh root

  - name: Set up R library for caching, NOT_CRAN
    run: |
      R_LIBS_USER=${RUNNER_TEMP}/Library
      echo "R_LIBS_USER=${R_LIBS_USER}" >> ${GITHUB_ENV}
      if [[ -z "$NOT_CRAN" ]]; then echo "NOT_CRAN=true" >> ${GITHUB_ENV}; fi
      mkdir -p "${R_LIBS_USER}"
    shell: bash

  - run: |
      # Install R and pak
      echo "::group::Install R"
      # Install some system packages, so we can install tidyverse, devtools
      if [ "${{ inputs.r-version }}" = "devel" ]; then
        # Prebuilt R-devel snapshot. deps.txt sits next to the tarball and
        # lists its runtime packages, notably the gcc port whose libgfortran
        # the R binaries reference by rpath.
        url="${{ inputs.r-devel-url }}"
        fetch -o /tmp/R-deps.txt "${url%/*}/deps.txt"
        pkg install -y $(cat /tmp/R-deps.txt) checkbashisms libxml2 pkgconf libgit2 qpdf
        fetch -o /tmp/R.tar.zst "$url"
        mkdir -p /opt
        tar --zstd -xf /tmp/R.tar.zst -C /opt
        rm /tmp/R.tar.zst
        ln -sf /opt/R-devel/bin/R       /usr/local/bin/R
        ln -sf /opt/R-devel/bin/Rscript /usr/local/bin/Rscript
        R --version
      else
        pkg install -y R checkbashisms libxml2 pkgconf libgit2 qpdf pcre2
      fi
      echo "::endgroup::"
      echo "::group::Configure R"
      ncpu=`(sysctl dev.cpu | grep location | wc -l) || echo 4`
      echo "options(Ncpus=${ncpu})" >> ~/.Rprofile
      R -q -e 'dir.create(Sys.getenv("R_LIBS_SITE"), showWarnings = FALSE, recursive = TRUE)'
      echo 'export TZ=UTC' > /etc/profile.d/tz.sh
      chmod +x /etc/profile.d/tz.sh
      echo "::endgroup::"
      echo "::group::Install pak"
      R -q -e 'install.packages("pak", lib = Sys.getenv("R_LIBS_SITE"), repos = sprintf(
                 "https://r-lib.github.io/p/pak/devel/%s/%s/%s",
                 .Platform$pkgType,
                 R.Version()$os,
                 R.Version()$arch
               ))'
      # if that fails, try to install the released version from source
      R -q -e 'library(pak)' ||
        R -q -e 'install.packages("pak", lib = Sys.getenv("R_LIBS_SITE"), repos = "https://cloud.r-project.org")'
      echo "::endgroup::"
    shell: freebsd {0}

  - name: Set up remote shell
    run: |
      cp ${{ github.action_path }}/Rscript \
        /usr/local/bin/Rscript
      chmod 775 /usr/local/bin/Rscript
    shell: bash

  - name: Test R in FreeBSD VM
    run: |
      getRversion()
      R.version[["platform"]]
      .libPaths()
      .Library
      Sys.getenv("R_LIBS_SITE")
      Sys.getenv("R_LIBS_USER")
      find.package("pak")
    shell: Rscript {0}
